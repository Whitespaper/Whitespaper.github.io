<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机图片自动跳转</title>
    <script>
        // 当页面加载时自动执行
        window.onload = function() {
            var randomIndex = Math.floor(Math.random() * 19);  // 生成一个0到19之间的随机数
            // 存储图片页面的链接
            var urls = [
                "https://www.helloimg.com/i/2025/01/24/67939076a25b6.png",
                "https://www.helloimg.com/i/2025/01/24/6793919f72c78.png",
                "https://www.helloimg.com/i/2025/01/24/67939193f3a61.png",
                "https://www.helloimg.com/i/2025/01/24/6793918f63efa.png",
                "https://www.helloimg.com/i/2025/01/24/6793918cbdb00.png",
                "https://www.helloimg.com/i/2025/01/24/6793918a4330c.png",
                "https://www.helloimg.com/i/2025/01/24/6793918a1d655.png",
                "https://www.helloimg.com/i/2025/01/24/679391a0125f9.png",
                "https://www.helloimg.com/i/2025/01/24/6793938401ec8.png",
                "https://www.helloimg.com/i/2025/01/24/6793939638dd1.png",
                "https://www.helloimg.com/i/2025/01/24/679393aba9cad.png",
                "https://www.helloimg.com/i/2025/01/23/67920f7499ec5.png",
                "https://www.helloimg.com/i/2025/01/23/67920f756f0c2.png",
                "https://www.helloimg.com/i/2025/01/23/67920f7aeb89a.png",
                "https://www.helloimg.com/i/2025/01/23/67920f7b79f2e.png",
                "https://www.helloimg.com/i/2025/01/23/67920f70a3a90.png",
                "https://www.helloimg.com/i/2025/01/23/67920f671a1bd.png",
                "https://www.helloimg.com/i/2025/01/23/67920f771bf7f.png",
                "https://www.helloimg.com/i/2025/01/23/67920f76a7360.png"
            ];

            // 自动跳转到对应的链接
            window.location.href = urls[randomIndex];
        };
    </script>
</head>
<body>
    <!-- 页面内容可以为空，因为它会直接跳转 -->
</body>
</html>
