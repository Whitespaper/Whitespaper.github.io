                "https://s21.ax1x.com/2025/01/23/pEAO8yV.png",
                "https://s21.ax1x.com/2025/01/23/pEAOGLT.png",
                "https://s21.ax1x.com/2025/01/23/pEAOYeU.png",
                "https://s21.ax1x.com/2025/01/23/pEAOtwF.png",
                "https://s21.ax1x.com/2025/01/23/pEAONo4.png",
                "https://s21.ax1x.com/2025/01/23/pEAOaFJ.png",

                "https://www.helloimg.com/i/2025/01/23/67920f671a1bd.png",
                "https://www.helloimg.com/i/2025/01/23/67920f771bf7f.png",
                "https://www.helloimg.com/i/2025/01/23/67920f76a7360.png"
            ];

            // 自动跳转到对应的链接
            window.location.href = urls[randomIndex];
        };
    </script>
</head>
<body>

</body>
</html>
